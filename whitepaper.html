<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova — Whitepaper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08090b;--bg2:#0d0e12;--brass:#c9a84c;--brass-dim:#9a7a30;--text:#d8d4cc;--text2:#9a968e;--text3:#5a5750;--mono:'JetBrains Mono',monospace;--serif:'Source Serif 4',Georgia,serif}
html{background:var(--bg);color:var(--text);scroll-behavior:smooth}
body{font-family:var(--serif);line-height:1.8}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,9,11,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.08)}
nav .inner{max-width:800px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
nav .logo{font-family:var(--mono);font-weight:800;font-size:15px;color:var(--brass);letter-spacing:4px;text-decoration:none}
nav .links{display:flex;gap:24px}
nav .links a{font-family:var(--mono);font-size:11px;color:var(--text2);text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s}
nav .links a:hover{color:var(--brass)}

.paper{max-width:800px;margin:0 auto;padding:120px 24px 80px}
.paper .meta{text-align:center;margin-bottom:60px}
.paper .meta h1{font-family:var(--mono);font-size:28px;font-weight:800;letter-spacing:4px;margin-bottom:12px}
.paper .meta h1 span{color:var(--brass)}
.paper .meta .subtitle{font-size:18px;color:var(--text2);margin-bottom:16px}
.paper .meta .info{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:1px}

.paper h2{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--brass);margin:48px 0 16px;padding-bottom:8px;border-bottom:1px solid rgba(201,168,76,0.1)}
.paper h3{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);margin:32px 0 12px}
.paper h4{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text);margin:24px 0 8px}
.paper p{color:var(--text2);margin-bottom:16px;font-size:16px}
.paper strong{color:var(--text)}
.paper ul,.paper ol{color:var(--text2);margin:0 0 16px 24px;font-size:16px}
.paper li{margin-bottom:6px}
.paper code{font-family:var(--mono);font-size:13px;background:var(--bg2);padding:2px 6px;border-radius:2px;color:var(--brass)}
.paper pre{background:var(--bg2);padding:16px;overflow-x:auto;margin:16px 0;border-left:3px solid var(--brass-dim);font-family:var(--mono);font-size:12px;line-height:1.6;color:var(--text2)}
.paper table{width:100%;border-collapse:collapse;margin:16px 0}
.paper th{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);text-align:left;padding:8px;border-bottom:1px solid rgba(201,168,76,0.1)}
.paper td{font-family:var(--mono);font-size:13px;padding:8px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text2)}
.paper td:first-child{color:var(--text)}
.paper blockquote{border-left:3px solid var(--brass-dim);padding:12px 16px;margin:16px 0;color:var(--text2);font-style:italic;background:var(--bg2)}

footer{border-top:1px solid rgba(201,168,76,0.06);padding:32px 0}
footer .inner{max-width:800px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center}
footer .copy{font-family:var(--mono);font-size:11px;color:var(--text3)}
footer a{font-family:var(--mono);font-size:11px;color:var(--text3);text-decoration:none}
footer a:hover{color:var(--brass)}
</style>
</head>
<body>

<nav>
  <div class="inner">
    <a href="index.html" class="logo">PROVA</a>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="index.html#token">Token</a>
      <a href="https://github.com/prova-network/prova" target="_blank">GitHub</a>
    </div>
  </div>
</nav>

<div class="paper">
  <div class="meta">
    <h1>PROVA: <span>WHITEPAPER</span></h1>
    <p class="subtitle">A Verifiable Storage and Compute Network</p>
    <p class="info">Version 0.1 — March 2026 — Prova Team</p>
  </div>

  <div id="content"></div>
</div>

<footer>
  <div class="inner">
    <div class="copy">© 2026 Prova Team.</div>
    <a href="index.html">← Back to Home</a>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch('whitepaper-source.md')
  .then(r => r.text())
  .then(md => {
    // Skip the first few lines (title, author, date) since we have our own header
    const lines = md.split('\n');
    const startIdx = lines.findIndex(l => l.startsWith('## Abstract'));
    const trimmed = startIdx >= 0 ? lines.slice(startIdx).join('\n') : md;
    document.getElementById('content').innerHTML = marked.parse(trimmed);
  })
  .catch(() => {
    document.getElementById('content').innerHTML = '<p>Whitepaper loading failed. <a href="https://github.com/prova-network/prova/blob/main/whitepaper.md">Read on GitHub</a>.</p>';
  });
</script>
</body>
</html>
